# 生产部署工作流（需要根据实际服务器配置修改）
name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/geo-seo
            
            # 拉取最新代码
            git pull origin main
            
            # 拉取 Docker 镜像
            docker pull ghcr.io/${{ github.repository }}/web:latest
            docker pull ghcr.io/${{ github.repository }}/worker:latest
            
            # 重启服务
            docker compose down
            docker compose up -d
            
            # 清理旧镜像
            docker image prune -f

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "Deployment ${{ inputs.environment }} completed with status: ${{ needs.deploy.result }}"
